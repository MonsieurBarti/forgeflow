name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag matches package.json
        env:
          TAG: ${{ github.ref_name }}
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Create tarball
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          tar czf "dist/forge-${TAG}.tar.gz" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.beads' \
            --exclude='.claude' \
            --exclude='.runtime' \
            --exclude='.logs' \
            --exclude='node_modules' \
            --exclude='dist' \
            .

      - name: Compute SHA256
        id: sha
        env:
          TAG: ${{ github.ref_name }}
        run: |
          SHA=$(shasum -a 256 "dist/forge-${TAG}.tar.gz" | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA"

      - name: Extract changelog section
        id: changelog
        run: |
          if [ -f CHANGELOG.md ]; then
            # Extract first version section (between first ## [ and second ## [)
            awk '/^## \[/{if(found) exit; found=1} found{print}' CHANGELOG.md > /tmp/release-notes.md
            if [ -s /tmp/release-notes.md ]; then
              echo "has_notes=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_notes=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.changelog.outputs.has_notes == 'true' && '/tmp/release-notes.md' || '' }}
          generate_release_notes: ${{ steps.changelog.outputs.has_notes != 'true' }}
          files: dist/forge-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

